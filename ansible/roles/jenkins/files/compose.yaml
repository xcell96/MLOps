services:
  llm_server:
    container_name: llm_server
    image: "ghcr.io/ggml-org/llama.cpp:server-vulkan"
    entrypoint:
      [
        "/app/llama-server",
        "-c",
        "0",
        "--host",
        "0.0.0.0",
        "--port",
        "8083",
        "-hf",
        "gguf-org/gemma-3-1b-it-gguf:Q4_K_S"
      ]
    devices:
      #- /dev/kfd
      - /dev/dri
    security_opt:
      - seccomp=unconfined
    ports:
      - "8083:8083"
    networks:
      - intranet
    restart: unless-stopped

  open_webui:
    container_name: open_webui
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llm_server:8083/v1
      - OPENAI_API_KEY=sk-no-key-required
    volumes:
      - open-webui:/app/backend/data
    networks:
      - intranet
    restart: unless-stopped

volumes:
  open-webui:

networks:
  intranet:
