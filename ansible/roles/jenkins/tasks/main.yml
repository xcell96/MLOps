- name: Install Java
  dnf:
    name:
      - java-21-openjdk
    state: present

- name: Install python-jenkins dependency
  pip:
    name: python-jenkins
    executable: pip3

- name: Add Jenkins repository
  get_url:
    url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Import Jenkins key
  rpm_key:
    key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
    state: present

- name: Install Jenkins
  dnf:
    name: jenkins
    state: present

- name: Enable and start Jenkins service
  systemd:
    name: jenkins
    enabled: true
    state: started

- name: Wait for Jenkins to become available
  uri:
    url: http://localhost:8080/login
    status_code: 200
  register: jenkins_check
  retries: 30
  delay: 5
  until: jenkins_check.status == 200

- name: Open Jenkins port
  firewalld:
    port: 8080/tcp
    permanent: true
    immediate: true
    state: enabled

- name: Add Jenkins to wheel
  user:
    name: jenkins
    groups: wheel
    append: true

- name: Configure subordinate UIDs for jenkins
  lineinfile:
    path: /etc/subuid
    regexp: '^jenkins:'
    line: 'jenkins:100000:65536'
    create: true

- name: Configure subordinate GIDs for jenkins
  lineinfile:
    path: /etc/subgid
    regexp: '^jenkins:'
    line: 'jenkins:100000:65536'
    create: true

- name: Enable lingering for jenkins
  command: loginctl enable-linger jenkins
  changed_when: false

- name: Gather group database
  getent:
    database: group

- name: Add jenkins to video group
  user:
    name: jenkins
    groups: video
    append: true
  when: "'video' in getent_group"

- name: Add jenkins to render group
  user:
    name: jenkins
    groups: render
    append: true
  when: "'render' in getent_group"

- name: Run podman system migrate as jenkins
  become: true
  become_user: jenkins
  command: podman system migrate
  register: podman_migrate
  failed_when: false
  changed_when: podman_migrate.rc == 0

- name: Configure podman sudo access
  copy:
    dest: /etc/sudoers.d/jenkins-podman
    mode: '0440'
    validate: 'visudo -cf %s'
    content: |
      jenkins ALL=(ALL) NOPASSWD: /usr/bin/podman
      jenkins ALL=(ALL) NOPASSWD: /usr/bin/podman-compose

- name: Create deployment directory
  file:
    path: /var/lib/jenkins/workspace/LLM-Pipeline
    state: directory
    owner: jenkins
    group: jenkins

- name: Copy compose file
  copy:
    src: compose.yaml
    dest: /var/lib/jenkins/workspace/LLM-Pipeline/compose.yaml
    owner: jenkins
    group: jenkins

- name: Copy Jenkinsfile
  copy:
    src: Jenkinsfile
    dest: /var/lib/jenkins/workspace/LLM-Pipeline/Jenkinsfile
    owner: jenkins
    group: jenkins

- name: Restart Jenkins after full config
  systemd:
    name: jenkins
    state: restarted

- name: Read initial Jenkins password
  slurp:
    src: /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_pw
  become: true

- name: Save initial Jenkins password locally
  copy:
    content: "{{ jenkins_pw.content | b64decode }}"
    dest: ./jenkins-initial-password.txt
    mode: '0600'
  delegate_to: localhost
